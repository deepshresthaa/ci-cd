name: Deploy NodeJs Application
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      -name: Checkout Code
      uses: actions/checkout@v4
      with:
        host: ${{ secrets.SSH_HOST }}
        username: root
        key: ${{ secrets.SSH_KEY }}
        script: |
          cd /root/ci-cd
          git pull
          docker compose up -d --build